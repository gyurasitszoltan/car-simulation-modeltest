<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boulder Dash</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh; font-family: 'Courier New', monospace;
    color: #ccc; overflow: hidden;
  }
  #hud {
    display: flex; gap: 40px; padding: 10px 30px;
    font-size: 18px; font-weight: bold;
    color: #ffd700; letter-spacing: 1px;
    background: #111; border-bottom: 2px solid #333;
    width: 100%; justify-content: center;
  }
  #hud span.val { color: #fff; }
  #gameCanvas {
    border: 3px solid #444;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #overlay {
    position: absolute; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.85); z-index: 10;
    width: 100%; height: 100%;
  }
  #overlay.show { display: flex; }
  #overlay h1 { font-size: 48px; color: #ffd700; margin-bottom: 16px; text-shadow: 0 0 20px #ffd700; }
  #overlay p  { font-size: 22px; color: #fff; margin-bottom: 30px; }
  #overlay button {
    padding: 14px 40px; font-size: 20px; font-family: 'Courier New', monospace;
    background: #ffd700; color: #000; border: none; cursor: pointer;
    font-weight: bold; letter-spacing: 2px;
  }
  #overlay button:hover { background: #fff; }
  #instructions {
    position: absolute; bottom: 20px; font-size: 13px;
    color: #555; text-align: center;
  }
</style>
</head>
<body>

<div id="hud">
  <div>DIAMONDS: <span class="val" id="hudDiamonds">0</span> / <span class="val" id="hudRequired">10</span></div>
  <div>TIME: <span class="val" id="hudTime">120</span></div>
  <div>LIVES: <span class="val" id="hudLives">3</span></div>
  <div>SCORE: <span class="val" id="hudScore">0</span></div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="overlay">
  <h1 id="overlayTitle"></h1>
  <p id="overlayMsg"></p>
  <button id="overlayBtn" onclick="startGame()">START</button>
</div>

<div id="instructions">Arrow keys / WASD to move &bull; SPACE to restart</div>

<script>
// ─── CONSTANTS ───────────────────────────────────────────
let   COLS          = 40;   // a map-ból számítjuk
let   ROWS          = 25;   // a map-ból számítjuk
const TILE          = 20;
const TICK_MS       = 150;
const DEFAULT_TIME  = 180;  // alapértelmezés, ha a pálya nem adja meg
const DEFAULT_REQ   = 10;   // alapértelmezés, ha a pálya nem adja meg
const MAX_LIVES     = 3;
const EXPLOSION_MS  = 600;
const EXPLOSION_TICS = Math.floor(EXPLOSION_MS / TICK_MS);

// Tile type IDs
const T = {
  EMPTY: 0,
  DIRT:  1,
  WALL:  2,
  BOULDER: 3,
  DIAMOND: 4,
  EXIT_CLOSED: 5,
  EXIT_OPEN:   6,
  ENEMY: 7,
  EXPLOSION: 8,
};

// Colors
const COLORS = {
  [T.EMPTY]:     '#1a1a2e',
  [T.DIRT]:      '#8B4513',
  [T.WALL]:      '#555566',
  [T.BOULDER]:   '#999999',
  [T.DIAMOND]:   '#00bfff',
  [T.EXIT_CLOSED]:'#660000',
  [T.EXIT_OPEN]:  '#006600',
  [T.ENEMY]:     '#ff4444',
  [T.EXPLOSION]:  '#ff6600',
};

const COLOR_ACCENT = {
  [T.DIRT]:      '#a0522d',
  [T.WALL]:      '#777788',
  [T.BOULDER]:   '#bbbbbb',
  [T.DIAMOND]:   '#88eeff',
  [T.EXIT_CLOSED]:'#ff3333',
  [T.EXIT_OPEN]:  '#33ff33',
  [T.ENEMY]:     '#ff8888',
  [T.EXPLOSION]:  '#ffaa44',
};

// ─── LEVEL DATA (strings per row) ────────────────────────
// Symbols:
//   ' ' = empty, '#' = wall, '=' = dirt
//   'o' = boulder, 'D' = diamond
//   'X' = exit, '@' = player, '^' = enemy
//   '!' = stone (boulder equivalent), 'E' = enemy
const LEVELS = [
  // Level 1
  { required: 10, time: 180, map: [
    "########################################",
    "#==D====D====D====D====D====D====D===XD#",
    "#======o=====o====o=====o=====o========#",
    "#o====oo===o=o==oo===o====o==o=o====o==#",
    "#============oo=o============o=o==ooo==#",
    "#======================================#",
    "#                                      #",
    "#    E=        E=        E=       E    #",
    "#    ##=       ===       ===           #",
    "#====##================================#",
    "#D==D##D==D==D==D==D==D==D==D==D==D==D=#",
    "#====#=================================#",
    "#===o#===o====o====o====o====o====o====#",
    "#====#=================================#",
    "#    #                                 #",
    "#    #  E        E        E        E   #",
    "#    #                                 #",
    "#====#=================================#",
    "#==D=#D==D==D==D==D==D==D==D==D==D==D==#",
    "#====###===============================#",
    "#==o=#==o====o====o====o====o====o====o#",
    "#====#=================================#",
    "#======================================#",
    "#=@====================================#",
    "########################################",
  ]},
  // Level 2
  { required: 18, time: 150, map: [
    "########################################",
    "#==D==D==D==D==D==D==D==D==D==D==D==DX=#",
    "#======================================#",
    "#====o====o====o====o====o====o====o===#",
    "#======================================#",
    "#                                      #",
    "#   E      E        E        E      E  #",
    "#                                      #",
    "#======================================#",
    "#=D==D==D==D==D==D==D==D==D==D==D==D==D#",
    "#======================================#",
    "#o====o====o====o====o====o====o====o==#",
    "#======================================#",
    "#                                      #",
    "#     E         E         E        E   #",
    "#                                      #",
    "#======================================#",
    "#D==D==D==D==D==D==D==D==D==D==D==D==D=#",
    "#======================================#",
    "#==o====o====o====o====o====o====o====o#",
    "#======================================#",
    "#                                      #",
    "#      E          E         E       E  #",
    "#=@====================================#",
    "########################################",
  ]},
];

// ─── GAME STATE ──────────────────────────────────────────
let grid       = [];   // 2D array of tile IDs
let entities   = [];   // player and enemy positions  {x, y, type}
let playerPos  = null;
let enemies    = [];
let explosions = [];   // {x, y, remainingTics}
let score      = 0;
let lives      = MAX_LIVES;
let diamonds   = 0;
let timeLeft   = DEFAULT_TIME;
let currentLevel = 0;
let tickInterval = null;
let animFrame    = null;
let lastTick     = 0;
let gameOver     = false;
let levelReady       = false;
let fallingObjects   = new Set(); // tároljuk, hol esik le valami (az előző tickben)
let requiredDiamonds = DEFAULT_REQ; // aktív pálya gyémánt-célja

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
canvas.width  = COLS * TILE;
canvas.height = ROWS * TILE;

const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayMsg   = document.getElementById('overlayMsg');
const overlayBtn   = document.getElementById('overlayBtn');

// ─── LEVEL LOADING ───────────────────────────────────────
function loadLevel(idx) {
  const levelData = LEVELS[idx % LEVELS.length];
  const sym        = levelData.map;
  // Pálya mérete a map-ból
  ROWS = sym.length;
  COLS = sym.reduce((max, row) => Math.max(max, row.length), 0);
  canvas.width  = COLS * TILE;
  canvas.height = ROWS * TILE;
  requiredDiamonds = levelData.required || DEFAULT_REQ;
  grid = [];
  enemies = [];
  explosions = [];
  fallingObjects = new Set();
  diamonds = 0;
  playerPos = null;
  timeLeft = levelData.time || DEFAULT_TIME;

  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    const line = (sym[r] || sym[sym.length - 1] || '').padEnd(COLS, '#');
    for (let c = 0; c < COLS; c++) {
      const ch = line[c] || '#';
      switch(ch) {
        case '#': grid[r][c] = T.WALL;        break;
        case '=': grid[r][c] = T.DIRT;        break;
        case 'o': case '!': grid[r][c] = T.BOULDER; break;
        case 'D': grid[r][c] = T.DIAMOND;     break;
        case 'X': grid[r][c] = T.EXIT_CLOSED; break;
        case '@':
          grid[r][c] = T.EMPTY;
          playerPos = {x: c, y: r};
          break;
        case '^': case 'E':
          grid[r][c] = T.EMPTY;
          enemies.push({x: c, y: r, dir: 0}); // dir: 0=right, 1=down, 2=left, 3=up
          break;
        default:   grid[r][c] = T.EMPTY;
      }
    }
  }

  // Ensure exit exists if not placed
  let foundExit = false;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] === T.EXIT_CLOSED || grid[r][c] === T.EXIT_OPEN) foundExit = true;
    }
  }
  if (!foundExit) {
    // Place exit at bottom center
    grid[ROWS-2][Math.floor(COLS/2)] = T.EXIT_CLOSED;
    grid[ROWS-2][Math.floor(COLS/2)+1] = T.EXIT_CLOSED;
  }

  // Place player if map had no '@' marker
  // Ha a map nem tartalmaz '@' jelet, keresünk egy szabad cellát (dirt törlés NÉLKÜL)
  if (!playerPos) {
    outer: for (let r = ROWS - 2; r >= 1; r--) {
      for (let c = 1; c < COLS - 1; c++) {
        const t = grid[r][c];
        if (t === T.EMPTY || t === T.DIRT) {
          playerPos = { x: c, y: r };
          setCell(c, r, T.EMPTY);
          break outer;
        }
      }
    }
  }

  // Az enemyk kizárólag a map 'E'/'^' karaktereiből származnak – nincs automatikus spawn

  updateHud();
}

// ─── HUD ─────────────────────────────────────────────────
function updateHud() {
  document.getElementById('hudDiamonds').textContent = diamonds;
  document.getElementById('hudRequired').textContent = requiredDiamonds;
  document.getElementById('hudTime').textContent = Math.ceil(timeLeft);
  document.getElementById('hudLives').textContent = lives;
  document.getElementById('hudScore').textContent = score;
}

// ─── INPUT ───────────────────────────────────────────────
const KEYS = {};
document.addEventListener('keydown', e => {
  KEYS[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { KEYS[e.key] = false; });

function getDirection() {
  if (KEYS['ArrowLeft']  || KEYS['a'] || KEYS['A']) return {dx:-1, dy:0};
  if (KEYS['ArrowRight'] || KEYS['d'] || KEYS['D']) return {dx: 1, dy:0};
  if (KEYS['ArrowUp']    || KEYS['w'] || KEYS['W']) return {dx: 0, dy:-1};
  if (KEYS['ArrowDown']  || KEYS['s'] || KEYS['S']) return {dx: 0, dy:1};
  return null;
}

// ─── HELPERS ─────────────────────────────────────────────
function inBounds(x, y) { return x >= 0 && x < COLS && y >= 0 && y < ROWS; }
function isSolid(t)   { return t === T.WALL || t === T.EXIT_CLOSED; }
function isRounded(t) { return t === T.BOULDER || t === T.DIAMOND; }
function isOpen(t)    { return t === T.EMPTY || t === T.EXIT_OPEN; }

function getCell(x, y) {
  if (!inBounds(x, y)) return T.WALL;
  return grid[y][x];
}

function setCell(x, y, v) {
  if (inBounds(x, y)) grid[y][x] = v;
}

// ─── PLAYER MOVEMENT ─────────────────────────────────────
function movePlayer(dx, dy) {
  if (!playerPos) return;
  const px = playerPos.x;
  const py = playerPos.y;
  const nx = px + dx;
  const ny = py + dy;

  if (!inBounds(nx, ny)) return;
  const target = getCell(nx, ny);

  // Moving into empty or open exit or dirt or diamond
  if (isOpen(target)) {
    playerPos.x = nx;
    playerPos.y = ny;
    return;
  }

  // Moving into dirt -> dig it
  if (target === T.DIRT) {
    playerPos.x = nx;
    playerPos.y = ny;
    setCell(nx, ny, T.EMPTY);
    score += 1;
    return;
  }

  // Moving into diamond -> collect
  if (target === T.DIAMOND) {
    playerPos.x = nx;
    playerPos.y = ny;
    setCell(nx, ny, T.EMPTY);
    diamonds++;
    score += 100;
    if (diamonds >= requiredDiamonds) {
      // Open exit
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          if (grid[r][c] === T.EXIT_CLOSED) grid[r][c] = T.EXIT_OPEN;
    }
    return;
  }

  // Push boulder left/right only
  if (target === T.BOULDER && dy === 0) {
    const bx = nx + dx;
    if (inBounds(bx, ny) && getCell(bx, ny) === T.EMPTY) {
      setCell(bx, ny, T.BOULDER);
      setCell(nx, ny, T.EMPTY);
      playerPos.x = nx;
      playerPos.y = ny;
      return;
    }
  }

  // Bump into exit
  if (target === T.EXIT_OPEN && diamonds >= requiredDiamonds) {
    winGame();
    return;
  }
}

// ─── GRAVITY (boulders & diamonds) ──────────────────────
function applyGravity() {
  const newFalling = new Set();

  // Scan from bottom to top so falling objects are processed first
  for (let r = ROWS - 2; r >= 0; r--) {
    for (let c = 0; c < COLS; c++) {
      const t = grid[r][c];
      if (t !== T.BOULDER && t !== T.DIAMOND) continue;

      // A már zuhanó tárgyat (előző tickben esett) nem tartja meg a player
      const wasAlreadyFalling = fallingObjects.has(`${c},${r}`);

      // Ha a player pont alatta áll és a tárgy nem volt mozgásban: megtartja
      if (!wasAlreadyFalling && playerPos && playerPos.x === c && playerPos.y === r + 1) continue;

      const below = getCell(c, r + 1);

      if (isOpen(below)) {
        // Fall down
        setCell(c, r + 1, t);
        setCell(c, r, T.EMPTY);
        newFalling.add(`${c},${r + 1}`);
      }
      else if (isRounded(below) && r + 2 < ROWS) {
        // Resting on rounded object -> check diagonal roll
        const left      = getCell(c - 1, r);
        const leftBelow = getCell(c - 1, r + 1);
        const right     = getCell(c + 1, r);
        const rightBelow= getCell(c + 1, r + 1);

        if (left === T.EMPTY && leftBelow === T.EMPTY) {
          setCell(c - 1, r, t);
          setCell(c, r, T.EMPTY);
          // Gurulás – következő tickben esik le (nem számít zuhanónak még)
        }
        else if (right === T.EMPTY && rightBelow === T.EMPTY) {
          setCell(c + 1, r, t);
          setCell(c, r, T.EMPTY);
        }
      }
    }
  }

  fallingObjects = newFalling;
}

// ─── ENEMY AI ────────────────────────────────────────────
function moveEnemies() {
  // Shuffle order to prevent bias, then move each
  const order = [...enemies.keys()];
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }

  for (const idx of order) {
    const e = enemies[idx];
    if (!e) continue;

    const dirs = [
      {dx: 1, dy: 0},  // right
      {dx: 0, dy: 1},  // down
      {dx:-1, dy: 0},  // left
      {dx: 0, dy:-1},  // up
    ];

    // Try: left of current direction, then forward, then right, then reverse
    const baseDir = e.dir;
    const tryOrder = [
      (baseDir + 1) % 4,  // left turn
      baseDir,             // forward
      (baseDir + 3) % 4,  // right turn
      (baseDir + 2) % 4,  // reverse
    ];

    let moved = false;
    for (const nd of tryOrder) {
      const d = dirs[nd];
      const nx = e.x + d.dx;
      const ny = e.y + d.dy;
      if (!inBounds(nx, ny)) continue;
      const ct = getCell(nx, ny);
      if (ct === T.EMPTY || ct === T.EXIT_OPEN || ct === T.EXIT_CLOSED) {
        // Can move (even into closed exit)
        e.x = nx;
        e.y = ny;
        e.dir = nd;
        moved = true;
        break;
      }
      // Enemies cannot dig dirt — only the player can
    }

    if (!moved) {
      // Change direction randomly
      e.dir = Math.floor(Math.random() * 4);
    }
  }
}

// ─── EXPLOSIONS ──────────────────────────────────────────
function createExplosion(x, y) {
  explosions.push({x, y, remaining: EXPLOSION_TICS});
}

function updateExplosions() {
  for (let i = explosions.length - 1; i >= 0; i--) {
    const ex = explosions[i];
    ex.remaining--;
    if (ex.remaining <= 0) {
      // Clear explosion area
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          setCell(ex.x + dx, ex.y + dy, T.EMPTY);
        }
      }
      explosions.splice(i, 1);
    }
  }
}

function resolveExplosions() {
  for (const ex of explosions) {
    // Destroy dirt in 3x3
    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -1; dx <= 1; dx++) {
        const x = ex.x + dx;
        const y = ex.y + dy;
        const t = getCell(x, y);
        if (t === T.DIRT || t === T.BOULDER) {
          setCell(x, y, T.EMPTY);
          if (t === T.BOULDER) {
            score += 50;
            // Small chance of diamond
            if (Math.random() < 0.3) {
              setCell(x, y, T.DIAMOND);
            }
          }
        }
        else if (t === T.WALL && Math.random() < 0.05) {
          setCell(x, y, T.EMPTY); // Rarely break wall
        }
      }
    }
  }
}

// ─── COLLISIONS ──────────────────────────────────────────
function resolveCollisions() {
  if (!playerPos) return;
  // Player vs enemy
  for (const e of enemies) {
    if (e.x === playerPos.x && e.y === playerPos.y) {
      killPlayer();
      return;
    }
  }

  // Enemies vs player (adjacent check also kills)
  for (const e of enemies) {
    const dx = Math.abs(e.x - playerPos.x);
    const dy = Math.abs(e.y - playerPos.y);
    if (dx + dy === 1) {
      killPlayer();
      return;
    }
  }

  // Falling objects vs player
  // Csak akkor sebez, ha a tárgy legalább +1 magasságból esett (fallingObjects nyomon követi)
  if (playerPos) {
    const px = playerPos.x;
    const py = playerPos.y;
    const atPlayer = getCell(px, py);
    if (isRounded(atPlayer) && fallingObjects.has(`${px},${py}`)) {
      killPlayer();
      return;
    }
  }

  // Falling objects vs enemies (visszafelé iterálunk a biztonságos törlés miatt)
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    const atEnemy = getCell(e.x, e.y);
    if (isRounded(atEnemy) && fallingObjects.has(`${e.x},${e.y}`)) {
      enemies.splice(i, 1);
      createExplosion(e.x, e.y);
      score += 500;
    }
  }
}

function killPlayer() {
  lives--;
  score = Math.max(0, score - 200);
  if (lives <= 0) {
    loseGame();
    return;
  }
  // Reset player position
  playerPos = findSpawn();
}

function findSpawn() {
  // Find a safe spot near bottom center
  const cx = Math.floor(COLS / 2);
  for (let r = ROWS - 5; r >= ROWS - 10; r--) {
    for (let c = cx - 3; c <= cx + 3; c++) {
      if (inBounds(c, r) && getCell(c, r) === T.EMPTY) {
        return {x: c, y: r};
      }
    }
  }
  return {x: cx, y: ROWS - 2};
}

// ─── WIN / LOSE ──────────────────────────────────────────
function winGame() {
  gameOver = true;
  clearInterval(tickInterval);
  const nextLevel = currentLevel + 1;
  if (nextLevel < LEVELS.length) {
    overlayTitle.textContent = 'LEVEL COMPLETE!';
    overlayMsg.textContent   = `Score: ${score}`;
    overlayBtn.textContent   = 'NEXT LEVEL';
    overlayBtn.onclick       = () => { currentLevel = nextLevel; startGame(); };
  } else {
    overlayTitle.textContent = 'YOU WIN!';
    overlayMsg.textContent   = `Final Score: ${score}`;
    overlayBtn.textContent   = 'PLAY AGAIN';
    overlayBtn.onclick       = () => { currentLevel = 0; startGame(); };
  }
  overlay.classList.add('show');
}

function loseGame() {
  gameOver = true;
  clearInterval(tickInterval);
  overlayTitle.textContent = 'GAME OVER';
  overlayMsg.textContent   = `Final Score: ${score}`;
  overlayBtn.textContent   = 'TRY AGAIN';
  overlayBtn.onclick       = () => { currentLevel = 0; startGame(); };
  overlay.classList.add('show');
}

// ─── GAME TICK ───────────────────────────────────────────
function gameTick() {
  if (gameOver) return;

  const dir = getDirection();
  if (dir) {
    movePlayer(dir.dx, dir.dy);
    // Reset directional input after processing to prevent multi-move
    KEYS['ArrowLeft']  = false;
    KEYS['ArrowRight'] = false;
    KEYS['ArrowUp']    = false;
    KEYS['ArrowDown']  = false;
    KEYS['a'] = KEYS['A'] = false;
    KEYS['d'] = KEYS['D'] = false;
    KEYS['w'] = KEYS['W'] = false;
    KEYS['s'] = KEYS['S'] = false;
  }

  applyGravity();
  moveEnemies();
  updateExplosions();
  resolveExplosions();
  resolveCollisions();
  updateHud();

  // Check win condition (exit open + player on exit)
  if (diamonds >= requiredDiamonds && playerPos) {
    const onExit = getCell(playerPos.x, playerPos.y) === T.EXIT_OPEN;
    if (onExit) winGame();
  }
}

// ─── RENDERING ───────────────────────────────────────────
function render() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw grid (skip if level not loaded yet)
  if (!levelReady || !grid.length) return;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const tile = grid[r][c];
      if (tile === T.EMPTY) continue;

      const x = c * TILE;
      const y = r * TILE;

      switch(tile) {
        case T.WALL:
          ctx.fillStyle = COLORS[T.WALL];
          ctx.fillRect(x, y, TILE, TILE);
          ctx.fillStyle = COLOR_ACCENT[T.WALL];
          ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
          break;

        case T.DIRT:
          ctx.fillStyle = COLORS[T.DIRT];
          ctx.fillRect(x, y, TILE, TILE);
          ctx.fillStyle = COLOR_ACCENT[T.DIRT];
          ctx.fillRect(x + 3, y + 3, 4, 4);
          ctx.fillRect(x + 10, y + 9, 5, 5);
          break;

        case T.BOULDER:
          ctx.fillStyle = COLORS[T.BOULDER];
          ctx.beginPath();
          ctx.arc(x + TILE/2, y + TILE/2, TILE/2 - 1, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = COLOR_ACCENT[T.BOULDER];
          ctx.beginPath();
          ctx.arc(x + TILE/2 - 2, y + TILE/2 - 2, 3, 0, Math.PI * 2);
          ctx.fill();
          break;

        case T.DIAMOND:
          ctx.fillStyle = COLORS[T.DIAMOND];
          ctx.beginPath();
          ctx.arc(x + TILE/2, y + TILE/2, TILE/2 - 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = COLOR_ACCENT[T.DIAMOND];
          ctx.fillRect(x + TILE/2 - 3, y + TILE/2 - 3, 6, 6);
          break;

        case T.EXIT_CLOSED:
          ctx.fillStyle = COLORS[T.EXIT_CLOSED];
          ctx.fillRect(x, y, TILE, TILE);
          ctx.strokeStyle = COLOR_ACCENT[T.EXIT_CLOSED];
          ctx.lineWidth = 2;
          ctx.strokeRect(x + 2, y + 2, TILE - 4, TILE - 4);
          break;

        case T.EXIT_OPEN:
          ctx.fillStyle = COLORS[T.EXIT_OPEN];
          ctx.fillRect(x, y, TILE, TILE);
          ctx.fillStyle = COLOR_ACCENT[T.EXIT_OPEN];
          ctx.beginPath();
          ctx.arc(x + TILE/2, y + TILE/2, TILE/2 - 3, 0, Math.PI * 2);
          ctx.fill();
          break;

        case T.EXPLOSION:
          // handled by explosion objects
          break;
      }
    }
  }

  // Draw explosions
  const pulse = (Date.now() % 300) / 300;
  for (const ex of explosions) {
    const radius = (TILE * 1.5) * (0.5 + pulse * 0.5);
    const gradient = ctx.createRadialGradient(
      ex.x * TILE + TILE/2, ex.y * TILE + TILE/2, 0,
      ex.x * TILE + TILE/2, ex.y * TILE + TILE/2, radius
    );
    gradient.addColorStop(0, `rgba(255, 200, 50, ${0.9 - pulse * 0.5})`);
    gradient.addColorStop(0.5, `rgba(255, 100, 0, ${0.6 - pulse * 0.4})`);
    gradient.addColorStop(1, 'rgba(255, 50, 0, 0)');
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(ex.x * TILE + TILE/2, ex.y * TILE + TILE/2, radius, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw enemies
  const blink = Math.floor(Date.now() / 200) % 2;
  for (const e of enemies) {
    const x = e.x * TILE;
    const y = e.y * TILE;

    // Body
    ctx.fillStyle = blink ? '#ff4444' : '#ff6644';
    ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 5, y + 5, 4, 4);
    ctx.fillRect(x + 11, y + 5, 4, 4);
    ctx.fillStyle = '#000';
    ctx.fillRect(x + 6 + (e.dir === 0 ? 1 : e.dir === 2 ? -1 : 0), y + 6, 2, 2);
    ctx.fillRect(x + 12 + (e.dir === 0 ? 1 : e.dir === 2 ? -1 : 0), y + 6, 2, 2);

    // Spikes
    ctx.fillStyle = '#ff8844';
    ctx.fillRect(x + 1, y + 1, 2, 3);
    ctx.fillRect(x + TILE - 3, y + 1, 2, 3);
    ctx.fillRect(x + 1, y + TILE - 4, 2, 3);
    ctx.fillRect(x + TILE - 3, y + TILE - 4, 2, 3);
  }

  // Draw player
  if (playerPos && !gameOver) {
    const px = playerPos.x * TILE;
    const py = playerPos.y * TILE;

    // Body
    ctx.fillStyle = '#44ff44';
    ctx.fillRect(px + 3, py + 3, TILE - 6, TILE - 6);

    // Helmet
    ctx.fillStyle = '#ccaa44';
    ctx.fillRect(px + 4, py + 2, TILE - 8, 6);

    // Headlamp
    ctx.fillStyle = '#ffff88';
    ctx.fillRect(px + TILE/2 - 2, py + 3, 4, 3);

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(px + 6, py + 8, 3, 3);
    ctx.fillRect(px + 11, py + 8, 3, 3);
    ctx.fillStyle = '#222';
    ctx.fillRect(px + 7, py + 9, 2, 2);
    ctx.fillRect(px + 12, py + 9, 2, 2);
  }

  // Draw border highlight
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth = 1;
  ctx.strokeRect(0, 0, canvas.width, canvas.height);
}

// ─── GAME LOOP ───────────────────────────────────────────
let lastGameTick = 0;

function gameLoop(timestamp) {
  animFrame = requestAnimationFrame(gameLoop);

  // Separate rendering from game ticks
  render();

  // Timer
  if (!gameOver && levelReady) {
    timeLeft -= 1/60;
    if (timeLeft <= 0) {
      timeLeft = 0;
      loseGame();
    }
    // Update time display more often
    document.getElementById('hudTime').textContent = Math.ceil(timeLeft);
  }
}

// ─── START / INIT ────────────────────────────────────────
function startGame() {
  overlay.classList.remove('show');
  gameOver = false;
  levelReady = true;
  currentLevel = currentLevel || 0;

  if (currentLevel >= LEVELS.length) currentLevel = 0;

  loadLevel(currentLevel);
  updateHud();

  if (tickInterval) clearInterval(tickInterval);
  tickInterval = setInterval(gameTick, TICK_MS);
}

// Show initial overlay
overlayTitle.textContent = 'BOULDER DASH';
overlayMsg.textContent   = 'Collect diamonds, then reach the exit!';
overlay.classList.add('show');

// Start render loop immediately (for title screen background)
requestAnimationFrame(gameLoop);

</script>
